<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2d6a2d">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<link rel="manifest" href="manifest.json">
<title>Ons Buiten – Bezorgroute</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f0e8; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #2d6a2d; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header span { font-size: 1.4rem; }
  #invoer { padding: 16px; background: white; border-bottom: 1px solid #ddd; }
  #invoer label { display: block; font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  #invoer-rij { display: flex; gap: 8px; }
  #tuinnummers { flex: 1; padding: 10px 12px; border: 1.5px solid #ccc; border-radius: 8px; font-size: 1rem; background: #fafafa; }
  #tuinnummers:focus { outline: none; border-color: #2d6a2d; }
  #bereken-btn { background: #2d6a2d; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: 1rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
  #bereken-btn:active { background: #245824; }
  #bereken-btn:disabled { background: #888; cursor: wait; }
  #status { padding: 8px 16px; font-size: 0.85rem; color: #555; min-height: 28px; }
  #status.fout { color: #c0392b; }
  #status.ok { color: #2d6a2d; }
  #route-info { padding: 0 16px 12px; display: none; }
  #stops-lijst { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .stop-badge { background: #2d6a2d; color: white; border-radius: 20px; padding: 4px 10px; font-size: 0.8rem; font-weight: 600; }
  .stop-badge.depot { background: #1a3d1a; }
  #kaart-wrapper { flex: 1; overflow: hidden; position: relative; background: #e8e0d0; touch-action: none; min-height: 300px; }
  #kaart-container { position: absolute; transform-origin: 0 0; cursor: grab; }
  #kaart-container:active { cursor: grabbing; }
  #kaart-img { display: block; user-select: none; -webkit-user-drag: none; }
  #route-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
  #laden { position: fixed; inset: 0; background: #2d6a2d; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; }
  #laden h2 { font-size: 1.3rem; }
  #laden p { font-size: 0.9rem; opacity: 0.8; }
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="laden">
  <div class="spinner"></div>
  <h2>Ons Buiten</h2>
  <p>Kaart laden…</p>
</div>

<header>
  <span>🌱</span>
  <h1>Bezorgroute Ons Buiten</h1>
</header>

<div id="invoer">
  <label for="tuinnummers">Tuinnummers (gescheiden door spatie of komma)</label>
  <div id="invoer-rij">
    <input type="text" id="tuinnummers" placeholder="bv. 37 156 203 kas werf" autocomplete="off" autocorrect="off" autocapitalize="off">
    <button id="bereken-btn" onclick="berekenRoute()">Berekenen</button>
  </div>
</div>

<div id="status">Voer tuinnummers in en druk op Berekenen.</div>

<div id="route-info">
  <div id="stops-lijst"></div>
</div>

<div id="kaart-wrapper">
  <div id="kaart-container">
    <img id="kaart-img" src="kaart.png" draggable="false">
    <canvas id="route-canvas"></canvas>
  </div>
</div>

<script>
let routeData = null;
let graph = null;
let penaltyMap = null;
let schaal = 1;
let panX = 0, panY = 0;
let isPanning = false, lastPan = null;
let initPinchDist = null, initSchaal = 1;
let huidigePixels = [];
let huidigeVolgorde = [];

async function laadData() {
  const resp = await fetch('routedata.json');
  routeData = await resp.json();
  buildGraph();
  buildPenaltyMap();
  document.getElementById('laden').style.display = 'none';
  initKaart();
}

function buildGraph() {
  graph = new Map();
  for (const [x1,y1,x2,y2,w] of routeData.edges) {
    const a = `${x1}|${y1}`, b = `${x2}|${y2}`;
    if (!graph.has(a)) graph.set(a, []);
    if (!graph.has(b)) graph.set(b, []);
    graph.get(a).push({node: b, w});
    graph.get(b).push({node: a, w});
  }
}

function buildPenaltyMap() {
  // penaltyMap: kruispuntNode -> [{vanKant, naarKant, penalty}]
  penaltyMap = new Map();
  const kp = routeData.kruispunten;
  const PENALTY = routeData.turn_penalty;

  // Correcte richtingen (bewegingsrichting, niet herkomstrichting):
  // Berthalaan/LvB:
  //   Uit Berthalaan (west->oost aankomst) linksaf naar noord: oost->noord VERBODEN
  //   Vanuit noorden (noord->zuid aankomst) rechtsaf Berthalaan in (west): zuid->west VERBODEN
  // Zijlanen/Zuidsingel (Elizabeth, Wilhelmina, Bertha):
  //   Uit zijlaan (oost->west aankomst) linksaf richting tuin 1 (zuiden): west->zuid VERBODEN
  //   Vanuit zuiden (zuid->noord aankomst) rechtsaf zijlaan in (west): noord->west VERBODEN

  const verboden = [
    ['B_LvB', 'oost', 'noord'],
    ['B_LvB', 'zuid', 'west'],
    ['B_ZS',  'west', 'zuid'],
    ['B_ZS',  'noord', 'west'],
    ['W_ZS',  'west', 'zuid'],
    ['W_ZS',  'noord', 'west'],
    ['E_ZS',  'west', 'zuid'],
    ['E_ZS',  'noord', 'west'],
  ];

  for (const [kpKey, vanKant, naarKant] of verboden) {
    const [kx, ky] = kp[kpKey];
    const node = `${kx}|${ky}`;
    if (!penaltyMap.has(node)) penaltyMap.set(node, []);
    penaltyMap.get(node).push({vanKant, naarKant, penalty: PENALTY});
  }
}

function getKant(fromNode, toNode) {
  const [fx, fy] = fromNode.split('|').map(Number);
  const [tx, ty] = toNode.split('|').map(Number);
  const dx = tx - fx, dy = ty - fy;
  if (Math.abs(dx) >= Math.abs(dy)) return dx > 0 ? 'oost' : 'west';
  return dy > 0 ? 'zuid' : 'noord';
}

function getTurnPenalty(prevNode, curNode, nextNode) {
  if (!prevNode || !penaltyMap.has(curNode)) return 0;
  const vanKant = getKant(prevNode, curNode);
  const naarKant = getKant(curNode, nextNode);
  for (const {vanKant: vk, naarKant: nk, penalty} of penaltyMap.get(curNode)) {
    if (vk === vanKant && nk === naarKant) return penalty;
  }
  return 0;
}

function nearestNode(cx, cy) {
  let best = null, bestD = Infinity;
  for (const key of graph.keys()) {
    const [x, y] = key.split('|').map(Number);
    const d = (x-cx)**2 + (y-cy)**2;
    if (d < bestD) { bestD = d; best = key; }
  }
  return best;
}

function dijkstra(startKey, endKey) {
  // State: {node, prev} — slaan op als object, index als integer voor snelheid
  const stateKey = (node, prev) => `${prev}=>${node}`;
  const dist = new Map();
  const cameFrom = new Map();
  const queue = [[0, startKey, null]]; // [cost, node, prevNode]
  dist.set(stateKey(startKey, null), 0);

  while (queue.length) {
    queue.sort((a,b) => a[0]-b[0]);
    const [d, u, p] = queue.shift();
    const sk = stateKey(u, p);
    if (cameFrom.has(sk) && cameFrom.get(sk) !== undefined && dist.get(sk) < d) continue;

    if (u === endKey) {
      // Reconstruct
      const path = [];
      let cur = sk;
      while (cur) {
        const node = cur.split('=>')[1];
        path.unshift(node);
        cur = cameFrom.get(cur);
      }
      return path;
    }

    for (const {node: v, w} of (graph.get(u) || [])) {
      const tp = getTurnPenalty(p, u, v);
      const nd = d + w + tp;
      const nsk = stateKey(v, u);
      if (!dist.has(nsk) || nd < dist.get(nsk)) {
        dist.set(nsk, nd);
        cameFrom.set(nsk, sk);
        queue.push([nd, v, u]);
      }
    }
  }
  return null;
}

function routeAfstand(volgorde) {
  const ep = routeData.entry_points;
  const seq = ['depot', ...volgorde, 'depot'];
  let totaal = 0;
  for (let i = 0; i < seq.length - 1; i++) {
    const [ax, ay] = ep[seq[i]];
    const [bx, by] = ep[seq[i+1]];
    totaal += Math.sqrt((ax-bx)**2 + (ay-by)**2);
  }
  return totaal;
}

function optimaliseerVolgorde(stops) {
  if (stops.length <= 7) {
    const perms = permutaties(stops);
    let beste = stops, besteD = routeAfstand(stops);
    for (const p of perms) {
      const d = routeAfstand(p);
      if (d < besteD) { besteD = d; beste = p; }
    }
    return beste;
  } else {
    const ep = routeData.entry_points;
    const overig = [...stops];
    const volgorde = [];
    let huidig = 'depot';
    while (overig.length) {
      const [hx, hy] = ep[huidig];
      let dichtstbij = null, minD = Infinity;
      for (const s of overig) {
        const [sx, sy] = ep[s];
        const d = (sx-hx)**2 + (sy-hy)**2;
        if (d < minD) { minD = d; dichtstbij = s; }
      }
      volgorde.push(dichtstbij);
      overig.splice(overig.indexOf(dichtstbij), 1);
      huidig = dichtstbij;
    }
    return volgorde;
  }
}

function permutaties(arr) {
  if (arr.length <= 1) return [arr];
  const result = [];
  for (let i = 0; i < arr.length; i++) {
    const rest = [...arr.slice(0,i), ...arr.slice(i+1)];
    for (const p of permutaties(rest)) result.push([arr[i], ...p]);
  }
  return result;
}

function resolveStop(input) {
  const s = input.trim().toLowerCase();
  if (routeData.aliases[s]) return routeData.aliases[s];
  if (routeData.entry_points[s]) return s;
  if (routeData.entry_points[input.trim()]) return input.trim();
  return null;
}

function berekenRoute() {
  if (!routeData) return;
  const invoer = document.getElementById('tuinnummers').value;
  const delen = invoer.split(/[\s,]+/).filter(Boolean);
  if (!delen.length) { setStatus('Voer minimaal één tuinnummer in.', 'fout'); return; }

  const stops = [], onbekend = [];
  for (const d of delen) {
    const id = resolveStop(d);
    if (id) stops.push(id);
    else onbekend.push(d);
  }

  if (onbekend.length) { setStatus(`Onbekend: ${onbekend.join(', ')}`, 'fout'); return; }

  const btn = document.getElementById('bereken-btn');
  btn.disabled = true;
  setStatus('Route optimaliseren…');

  setTimeout(() => {
    try {
      const geoptimaliseerd = optimaliseerVolgorde(stops);
      tekenRoute(geoptimaliseerd);
    } catch(e) {
      setStatus('Fout: ' + e.message, 'fout');
      console.error(e);
    }
    btn.disabled = false;
  }, 50);
}

function tekenRoute(stops) {
  const ep = routeData.entry_points;
  const volgorde = ['depot', ...stops, 'depot'];
  const allePixels = [];

  for (let i = 0; i < volgorde.length - 1; i++) {
    const a = volgorde[i], b = volgorde[i+1];
    const [ax, ay] = ep[a];
    const [bx, by] = ep[b];
    const na = nearestNode(ax, ay);
    const nb = nearestNode(bx, by);
    const pad = dijkstra(na, nb);
    if (!pad) { setStatus(`Geen pad van ${a} naar ${b}.`, 'fout'); return; }
    allePixels.push(...(allePixels.length ? pad.slice(1) : pad));
  }

  huidigePixels = allePixels;
  huidigeVolgorde = volgorde;
  herteken();
  setStatus(`Route berekend — ${stops.length} stop${stops.length !== 1 ? 's' : ''}, optimale volgorde.`, 'ok');
  toonStops(volgorde);
}

function herteken() {
  if (!huidigePixels.length) return;
  const img = document.getElementById('kaart-img');
  const canvas = document.getElementById('route-canvas');
  if (canvas.width !== img.naturalWidth) canvas.width = img.naturalWidth;
  if (canvas.height !== img.naturalHeight) canvas.height = img.naturalHeight;

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Route lijn in rood
  const pts = huidigePixels.map(p => p.split('|').map(Number));
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.strokeStyle = 'rgba(210, 30, 30, 0.85)';
  ctx.lineWidth = 12;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.stroke();

  // Pijlen op vaste intervallen
  const pijlInterval = 120;
  ctx.fillStyle = 'rgba(210, 30, 30, 0.9)';
  for (let i = pijlInterval; i < pts.length - 1; i += pijlInterval) {
    const [x1, y1] = pts[i - 3] || pts[0];
    const [x2, y2] = pts[i];
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const size = 18;
    ctx.save();
    ctx.translate(x2, y2);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(size, 0);
    ctx.lineTo(-size * 0.6, -size * 0.5);
    ctx.lineTo(-size * 0.6, size * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Stops — grote rondjes met tuinnummer
  const ep = routeData.entry_points;
  huidigeVolgorde.forEach((stop, i) => {
    if (stop === 'depot') return;
    const [x, y] = ep[stop];
    const label = stop; // tuinnummer
    const r = 32;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.strokeStyle = '#d21e1e';
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.fillStyle = '#d21e1e';
    const fontSize = label.length <= 3 ? 26 : 20;
    ctx.font = `bold ${fontSize}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
  });

  // Depot
  const [dx, dy] = ep['depot'];
  ctx.beginPath();
  ctx.arc(dx, dy, 32, 0, Math.PI * 2);
  ctx.fillStyle = '#1a3d1a';
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 20px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('START', dx, dy);
}

function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}

function toonStops(volgorde) {
  const info = document.getElementById('route-info');
  const lijst = document.getElementById('stops-lijst');
  lijst.innerHTML = '';
  volgorde.forEach((stop, i) => {
    const badge = document.createElement('span');
    badge.className = 'stop-badge' + (stop === 'depot' ? ' depot' : '');
    badge.textContent = i === 0 ? '🏁 Start' : i === volgorde.length - 1 ? '🏁 Einde' : `${i}. ${stop}`;
    lijst.appendChild(badge);
  });
  info.style.display = 'block';
}

function initKaart() {
  const wrapper = document.getElementById('kaart-wrapper');
  const img = document.getElementById('kaart-img');
  const stelIn = () => { schaal = wrapper.clientWidth / img.naturalWidth; panX = 0; panY = 0; updateTransform(); };
  if (img.complete && img.naturalWidth) stelIn(); else img.onload = stelIn;

  wrapper.addEventListener('touchstart', e => {
    if (e.touches.length === 2) { initPinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); initSchaal = schaal; }
    else { isPanning = true; lastPan = {x: e.touches[0].clientX, y: e.touches[0].clientY}; }
  }, {passive: true});
  wrapper.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && initPinchDist) { const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); schaal = Math.min(4, Math.max(0.2, initSchaal*dist/initPinchDist)); updateTransform(); }
    else if (e.touches.length === 1 && isPanning && lastPan) { panX += e.touches[0].clientX-lastPan.x; panY += e.touches[0].clientY-lastPan.y; lastPan = {x: e.touches[0].clientX, y: e.touches[0].clientY}; updateTransform(); }
  }, {passive: true});
  wrapper.addEventListener('touchend', () => { isPanning = false; lastPan = null; initPinchDist = null; });
  wrapper.addEventListener('mousedown', e => { isPanning = true; lastPan = {x: e.clientX, y: e.clientY}; });
  wrapper.addEventListener('mousemove', e => { if (!isPanning||!lastPan) return; panX += e.clientX-lastPan.x; panY += e.clientY-lastPan.y; lastPan = {x: e.clientX, y: e.clientY}; updateTransform(); });
  wrapper.addEventListener('mouseup', () => { isPanning = false; });
  wrapper.addEventListener('mouseleave', () => { isPanning = false; });
  wrapper.addEventListener('wheel', e => { e.preventDefault(); schaal = Math.min(4, Math.max(0.2, schaal*(e.deltaY<0?1.1:0.9))); updateTransform(); }, {passive: false});
}

function updateTransform() {
  document.getElementById('kaart-container').style.transform = `translate(${panX}px, ${panY}px) scale(${schaal})`;
  herteken();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('tuinnummers').addEventListener('keydown', e => { if (e.key==='Enter') berekenRoute(); });
  laadData();
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
